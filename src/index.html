<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WriteAI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="window" id="app">

      <!-- ── Title bar ── -->
      <header class="titlebar">
        <div class="titlebar-left">
          <div class="app-icon" aria-hidden="true">W</div>
          <span class="app-name">WriteAI</span>
          <span class="status-badge" id="statusBadge" role="status" aria-live="polite"></span>
        </div>
        <div class="titlebar-right">
          <button class="titlebar-btn" id="settingsBtn" aria-label="Open settings">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
              <path d="M7.07 0.65c0.521 0 0.99 0.348 1.13 0.852l0.25 0.896c0.28 0.12 0.54 0.27 0.78 0.45l0.9-0.23c0.5-0.13 1.02 0.1 1.28 0.55l0.57 0.99c0.26 0.45 0.17 1.01-0.21 1.36l-0.65 0.66c0.02 0.16 0.03 0.32 0.03 0.48s-0.01 0.32-0.03 0.48l0.65 0.66c0.38 0.35 0.47 0.91 0.21 1.36l-0.57 0.99c-0.26 0.45-0.78 0.68-1.28 0.55l-0.9-0.23c-0.24 0.18-0.5 0.33-0.78 0.45l-0.25 0.896c-0.14 0.504-0.609 0.852-1.13 0.852H5.93c-0.521 0-0.99-0.348-1.13-0.852l-0.25-0.896c-0.28-0.12-0.54-0.27-0.78-0.45l-0.9 0.23c-0.5 0.13-1.02-0.1-1.28-0.55l-0.57-0.99c-0.26-0.45-0.17-1.01 0.21-1.36l0.65-0.66C1.86 6.82 1.85 6.66 1.85 6.5s0.01-0.32 0.03-0.48l-0.65-0.66c-0.38-0.35-0.47-0.91-0.21-1.36l0.57-0.99c0.26-0.45 0.78-0.68 1.28-0.55l0.9 0.23c0.24-0.18 0.5-0.33 0.78-0.45l0.25-0.896C4.94 0.998 5.409 0.65 5.93 0.65h1.14zM6.5 4.5a2 2 0 100 4 2 2 0 000-4z" fill="currentColor"/>
            </svg>
          </button>
          <button class="titlebar-btn close-btn" id="closeBtn" aria-label="Close window">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
              <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- ── Tabs ── -->
      <div class="tabs">
        <button class="tab active" data-tab="write">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M11.5 1.5l3 3-9 9H2.5v-3l9-9z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Write
        </button>
        <button class="tab" data-tab="translate">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M1 3h8M5 1v2M3 3c0 3 2 6 6 8M9 3c-1.5 2.5-4 4.5-7 5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 10l1.5 4.5M8 10l3.5 0M14 14.5l-1.5-4.5M14 14.5l-3.5 0" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Translate
        </button>
      </div>

      <!-- ── Write modes ── -->
      <div class="mode-section" id="writeModes">
        <div class="mode-row" role="radiogroup" aria-label="Writing mode">
          <button class="mode-btn active" data-mode="grammar" role="radio" aria-checked="true">Fix Grammar</button>
          <button class="mode-btn" data-mode="rephrase" role="radio" aria-checked="false">Rephrase</button>
          <button class="mode-btn" data-mode="formal" role="radio" aria-checked="false">Formal</button>
          <button class="mode-btn" data-mode="casual" role="radio" aria-checked="false">Casual</button>
          <button class="mode-btn" data-mode="shorter" role="radio" aria-checked="false">Shorter</button>
        </div>
      </div>

      <!-- ── Translate modes ── -->
      <div class="mode-section" id="translateModes" style="display:none">
        <div class="mode-row" role="radiogroup" aria-label="Translation language">
          <button class="mode-btn mode-translate" data-mode="translate_en" role="radio" aria-checked="false">English</button>
          <button class="mode-btn mode-translate" data-mode="translate_ar" role="radio" aria-checked="false">عربي</button>
          <button class="mode-btn mode-translate" data-mode="translate_fr" role="radio" aria-checked="false">Fran&ccedil;ais</button>
          <button class="mode-btn mode-translate" data-mode="translate_es" role="radio" aria-checked="false">Espa&ntilde;ol</button>
        </div>
      </div>

      <!-- ── Content area ── -->
      <div class="content">
        <div class="text-panel original-panel" id="originalPanel" style="display:none">
          <div class="panel-label">Original</div>
          <div class="panel-text" id="originalText"></div>
        </div>

        <div class="type-section" id="typeSection" style="display:none">
          <textarea id="inputText" placeholder="Type or paste your text here..." spellcheck="false" autofocus aria-label="Text to improve"></textarea>
          <button class="primary-btn fix-btn" id="fixBtn">
            <span id="fixBtnText">Fix My Text</span>
            <span id="fixBtnLoading" style="display:none"><span class="spinner"></span></span>
          </button>
        </div>

        <div class="loading-section" id="loadingSection" style="display:none" role="status">
          <span class="spinner"></span>
          <span class="loading-text">Improving your text...</span>
        </div>

        <div class="text-panel result-panel" id="resultPanel" style="display:none">
          <div class="panel-label result-label">Improved</div>
          <div class="panel-text result-text" id="resultText"></div>
        </div>

        <div class="actions" id="actions" style="display:none">
          <button class="primary-btn replace-btn" id="replaceBtn" aria-label="Replace original text">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2 7L5.5 10.5L12 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Replace
          </button>
          <button class="secondary-btn" id="copyBtn" aria-label="Copy to clipboard">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true"><rect x="4" y="4" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M10 4V2.5C10 1.67 9.33 1 8.5 1H2.5C1.67 1 1 1.67 1 2.5V8.5C1 9.33 1.67 10 2.5 10H4" stroke="currentColor" stroke-width="1.2"/></svg>
            Copy
          </button>
          <button class="ghost-btn" id="retryBtn" aria-label="Try again">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M1.5 7a5.5 5.5 0 119.37 3.9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M1.5 3v4h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Retry
          </button>
        </div>

        <div class="error-section" id="errorSection" style="display:none" role="alert">
          <span class="error-text" id="errorText"></span>
        </div>
      </div>

      <!-- ── Shortcuts footer ── -->
      <footer class="shortcuts" id="hint">
        <div class="shortcut-row">
          <div class="shortcut-item">
            <span class="shortcut-keys"><kbd>⌘</kbd><kbd>⇧</kbd><kbd>D</kbd></span>
            <span class="shortcut-desc">Fix grammar</span>
          </div>
          <div class="shortcut-item">
            <span class="shortcut-keys"><kbd>⌘</kbd><kbd>⇧</kbd><kbd>E</kbd></span>
            <span class="shortcut-desc">→ English</span>
          </div>
          <div class="shortcut-item">
            <span class="shortcut-keys"><kbd>⌘</kbd><kbd>⇧</kbd><kbd>A</kbd></span>
            <span class="shortcut-desc">→ عربي</span>
          </div>
          <div class="shortcut-item">
            <span class="shortcut-keys"><kbd>⌘</kbd><kbd>⇧</kbd><kbd>W</kbd></span>
            <span class="shortcut-desc">Popup</span>
          </div>
        </div>
      </footer>

    </div>
    <script src="app.js"></script>
  </body>
</html>
